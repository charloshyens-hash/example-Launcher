<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>

<title>Jiuyi Desktop Gesture Overlay</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<style>.spring-stiff {
    transition-timing-function: cubic-bezier(0.175, 0.885, 0.32, 1.275)
    }
@keyframes fadeInScale {
    0% {
        opacity: 0;
        transform: scale(0.95) translateY(20px);
        } 100% {
        opacity: 1;
        transform: scale(1) translateY(0);
        }
    }
.animate-gesture-overlay {
    animation: fadeInScale 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards
    }
/* simulated wallpaper background for the body */
body {
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuCpKFq7pXt6PBHqMBhIM7UxxavDXrL6iDvo1QkY2VqoXxZ9MKZu0SkANsXJxR4eTKMYk1EBDygO2MSqqvSngvD3fv-rjssN--PFkPpGbWN-2UINOxuy-l5wwOVrSURfWf1qCwtwSzMmmWNTzFPBx03stjFL9h2ziurmni79DY6jX9bIQncKbZc0f56MYXa7t23PgA4B9et7WiwoEZ972EKI1MVqOEZK5PfHaGUsxnIYkestyNxwq6MCBRIwo_QaIVJsN80gMf983T0);
    background-size: cover;
    background-position: center;
    background-attachment: fixed
    }</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface antialiased h-screen w-screen overflow-hidden flex items-end justify-center relative">
<!-- Wallpaper overlay blur -->
<div class="absolute inset-0 z-0 backdrop-blur-[32px] bg-surface-container-low/60 pointer-events-none transition-all duration-500 ease-in-out"></div>
<!-- Top App Bar (Suppressed intentionally as per rules, overlay is not a top-level destination, but keeping structure if needed to close) -->
<!-- Content Canvas (Empty for overlay context) -->
<!-- Gesture Overlay Container -->
<div class="relative z-10 w-full max-w-md px-margin-main pb-24 flex flex-col items-center animate-gesture-overlay">
<!-- Pull Handle Indicator -->
<div class="w-12 h-1 bg-white/30 rounded-full mb-8 shadow-sm"></div>
<!-- Utility Grid -->
<div class="grid grid-cols-4 gap-x-gutter-grid gap-y-6 w-full">
<!-- Icon 1: Add -->
<button class="flex flex-col items-center group transition-transform duration-200 hover:scale-105 active:scale-95">
<div class="w-[60px] h-[60px] rounded-[20px] bg-white/10 backdrop-blur-md border border-white/10 flex items-center justify-center mb-2 shadow-[0_4px_24px_-4px_rgba(0,0,0,0.3)] group-hover:bg-white/20 transition-colors">
<span class="material-symbols-outlined text-on-surface text-[28px]" data-icon="add">add</span>
</div>
<span class="font-label-md text-label-md text-on-surface-variant">添加</span>
</button>
<!-- Icon 2: Effects -->
<button class="flex flex-col items-center group transition-transform duration-200 hover:scale-105 active:scale-95">
<div class="w-[60px] h-[60px] rounded-[20px] bg-white/10 backdrop-blur-md border border-white/10 flex items-center justify-center mb-2 shadow-[0_4px_24px_-4px_rgba(0,0,0,0.3)] group-hover:bg-white/20 transition-colors">
<span class="material-symbols-outlined text-on-surface text-[28px]" data-icon="auto_awesome">auto_awesome</span>
</div>
<span class="font-label-md text-label-md text-on-surface-variant">换特效</span>
</button>
<!-- Icon 3: Beautify -->
<button class="flex flex-col items-center group transition-transform duration-200 hover:scale-105 active:scale-95">
<div class="w-[60px] h-[60px] rounded-[20px] bg-white/10 backdrop-blur-md border border-white/10 flex items-center justify-center mb-2 shadow-[0_4px_24px_-4px_rgba(0,0,0,0.3)] group-hover:bg-white/20 transition-colors">
<span class="material-symbols-outlined text-on-surface text-[28px]" data-icon="brush">brush</span>
</div>
<span class="font-label-md text-label-md text-on-surface-variant">快速美化</span>
</button>
<!-- Icon 4: System -->
<button class="flex flex-col items-center group transition-transform duration-200 hover:scale-105 active:scale-95">
<div class="w-[60px] h-[60px] rounded-[20px] bg-white/10 backdrop-blur-md border border-white/10 flex items-center justify-center mb-2 shadow-[0_4px_24px_-4px_rgba(0,0,0,0.3)] group-hover:bg-white/20 transition-colors">
<span class="material-symbols-outlined text-on-surface text-[28px]" data-icon="settings">settings</span>
</div>
<span class="font-label-md text-label-md text-on-surface-variant">系统设置</span>
</button>
<!-- Icon 5: Themes -->
<button class="flex flex-col items-center group transition-transform duration-200 hover:scale-105 active:scale-95">
<div class="w-[60px] h-[60px] rounded-[20px] bg-white/10 backdrop-blur-md border border-white/10 flex items-center justify-center mb-2 shadow-[0_4px_24px_-4px_rgba(0,0,0,0.3)] group-hover:bg-white/20 transition-colors">
<span class="material-symbols-outlined text-on-surface text-[28px]" data-icon="palette">palette</span>
</div>
<span class="font-label-md text-label-md text-on-surface-variant">个性主题</span>
</button>
<!-- Icon 6: Profile -->
<button class="flex flex-col items-center group transition-transform duration-200 hover:scale-105 active:scale-95">
<div class="w-[60px] h-[60px] rounded-[20px] bg-white/10 backdrop-blur-md border border-white/10 flex items-center justify-center mb-2 shadow-[0_4px_24px_-4px_rgba(0,0,0,0.3)] group-hover:bg-white/20 transition-colors">
<span class="material-symbols-outlined text-on-surface text-[28px]" data-icon="person">person</span>
</div>
<span class="font-label-md text-label-md text-on-surface-variant">个人中心</span>
</button>
<!-- Icon 7: Preview -->
<button class="flex flex-col items-center group transition-transform duration-200 hover:scale-105 active:scale-95">
<div class="w-[60px] h-[60px] rounded-[20px] bg-white/10 backdrop-blur-md border border-white/10 flex items-center justify-center mb-2 shadow-[0_4px_24px_-4px_rgba(0,0,0,0.3)] group-hover:bg-white/20 transition-colors">
<span class="material-symbols-outlined text-on-surface text-[28px]" data-icon="preview">preview</span>
</div>
<span class="font-label-md text-label-md text-on-surface-variant">屏幕预览</span>
</button>
<!-- Icon 8: Desktop Settings -->
<button class="flex flex-col items-center group transition-transform duration-200 hover:scale-105 active:scale-95">
<div class="w-[60px] h-[60px] rounded-[20px] bg-white/10 backdrop-blur-md border border-white/10 flex items-center justify-center mb-2 shadow-[0_4px_24px_-4px_rgba(0,0,0,0.3)] group-hover:bg-white/20 transition-colors">
<span class="material-symbols-outlined text-on-surface text-[28px]" data-icon="desktop_windows">desktop_windows</span>
</div>
<span class="font-label-md text-label-md text-on-surface-variant">桌面设置</span>
</button>
</div>
</div>
<script>
        // Simple tap effect simulation for visual feedback
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function() {
                this.classList.add('scale-90');
                setTimeout(() => this.classList.remove('scale-90'), 150);
            });
        });
    </script>
</body></html>
